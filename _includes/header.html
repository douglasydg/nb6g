<!-- Header -->
<header id="header">

  <h1>
    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
  </h1>

  <nav class="links">
    <ul>
      {% for item in site.data.links %}
      <li>
        <a href="{{ item.href | relative_url }}">{{ item.name }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>

  <nav class="main">
    <ul>
      <li class="menu">
        <a href="#menu"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
  </nav>

  <!-- Menu -->
  <section id="menu">
    <section>
      <ul class="links">
        {% for item in site.data.links %}
        <li>
          <a href="{{ item.href | relative_url }}">
            <h3>{{ item.name }}</h3>
          </a>
        </li>
        {% endfor %}
      </ul>
    </section>
  </section>

</header>
